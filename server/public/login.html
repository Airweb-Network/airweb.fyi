<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AirWeb · Sign in</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#1c1c1e" />
<link rel="icon" type="image/png" href="/logo.png" />
<style>
  /* Theme tokens, base reset and header chrome live in /app.css and
     /header.css — shared with every other page. Only login-specific
     layout/styles below. */
  main {
    max-width: 1200px; margin: 0 auto;
    padding: 2.5rem 1.4rem 4rem;
    display: grid; place-items: start center;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 1.8rem 2rem;
    max-width: 560px; width: 100%;
    box-shadow: var(--shadow-card);
  }
  h1 {
    margin: 0 0 .4rem;
    font: 600 1.4rem/1.2 var(--display);
    color: var(--fg);
    letter-spacing: -.01em;
  }
  p.lead { color: var(--mute); margin: 0 0 1.4rem; font-size: .95rem; }
  label {
    display: block; font-size: .85rem; color: var(--fg2);
    margin: 1rem 0 .3rem; font-weight: 500;
  }
  textarea, input {
    background: var(--hover);
    border: 1px solid var(--line2);
    color: var(--fg);
    border-radius: var(--radius-sm);
    padding: .5rem .7rem;
    font: inherit; width: 100%;
    transition: border-color .12s, background .12s, box-shadow .12s;
  }
  textarea::placeholder, input::placeholder { color: var(--mute2); }
  textarea:hover, input:hover { background: var(--hover2); }
  textarea:focus, input:focus {
    outline: none;
    background: var(--panel);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
  }
  textarea { font-family: var(--mono); font-size: .82rem; min-height: 200px; resize: vertical; white-space: pre; }
  input[type="file"] { padding: .35rem .5rem; background: var(--hover); }
  button {
    background: var(--accent); color: var(--accent-fg);
    border: 1px solid transparent;
    padding: .55rem 1.2rem;
    border-radius: var(--radius-sm);
    font: 600 .95rem/1.3 var(--sans);
    cursor: pointer;
    transition: background .12s, filter .12s;
  }
  button:hover { background: var(--accent2); }
  button:active { filter: brightness(.95); }
  button:disabled { background: var(--hover2); color: var(--mute2); cursor: not-allowed; }
  .row { display: flex; gap: .6rem; align-items: center; margin-top: 1.2rem; }
  .right { margin-left: auto; }
  .err {
    color: var(--bad); margin-top: .8rem; font-size: .9rem;
    padding: .5rem .7rem; border-radius: var(--radius-sm);
    background: color-mix(in srgb, var(--bad) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--bad) 30%, transparent);
    min-height: 1px;
  }
  .err:empty { display: none; }
  .reason { color: var(--mute); font-size: .9rem; }
  code { background: var(--code); border: 1px solid var(--line); padding: 1px .4rem; border-radius: var(--radius-sm); font-family: var(--mono); font-size: .88em; color: var(--accent); }
</style>
<link rel="stylesheet" href="/header.css">
<link rel="stylesheet" href="/app.css">
<script src="/header.js" defer></script>
<script src="/i18n.js" defer></script>
<script src="/currency.js" defer></script>
</head>
<body>

<div id="aw-header"></div>

<main>
<div class="card">
  <h1>Sign in with your AirWeb key</h1>
  <p class="lead">Paste your <code>airweb_key</code> file (the OpenSSH private key you downloaded at registration). We re-derive your account ID from it locally on the server and start a session — the key is not stored.</p>

  <label for="keyText">Private key (OpenSSH format)</label>
  <textarea id="keyText" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----&#10;…&#10;-----END OPENSSH PRIVATE KEY-----"></textarea>

  <label for="keyFile" style="margin-top:.6rem">…or upload it</label>
  <input id="keyFile" type="file" />

  <label for="passphrase">Passphrase (if your key has one)</label>
  <input id="passphrase" type="password" autocomplete="off" />

  <div class="err" id="err"></div>

  <div class="row">
    <span class="reason">Don't have a key? <a href="/dashboard">Register here</a>.</span>
    <button class="right" id="loginBtn">Sign in</button>
  </div>
</div>
</main>

<script>
// Settings gear + theme bootstrap live in /header.js (shared across pages).
const $ = (id) => document.getElementById(id);

$('keyFile').onchange = async () => {
  const f = $('keyFile').files[0];
  if (!f) return;
  $('keyText').value = await f.text();
};

$('loginBtn').onclick = async () => {
  $('err').textContent = '';
  const pk = $('keyText').value.trim();
  if (!pk) { $('err').textContent = 'Paste or upload your private key.'; return; }
  $('loginBtn').disabled = true; $('loginBtn').textContent = 'Signing in…';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ privateKey: pk, passphrase: $('passphrase').value })
    });
    const body = await r.json().catch(() => ({}));
    if (!r.ok) { $('err').textContent = errorText(body.error, body); return; }
    location.href = '/dashboard';
  } catch (e) {
    $('err').textContent = 'Sign in failed: ' + e.message;
  } finally {
    $('loginBtn').disabled = false; $('loginBtn').textContent = 'Sign in';
  }
};

function errorText(code, body) {
  if (code === 'invalid_private_key') return 'That doesn\u2019t look like a valid OpenSSH private key.';
  if (code === 'account_not_found') return 'No AirWeb account exists for that key (account ID ' + (body.address || '?') + '). If this is a new key, register first.';
  return code || 'Sign in failed.';
}
</script>
</body></html>
