<!doctype html>
<html lang="en" translate="no">
<head>
<meta charset="utf-8" />
<title>AirWeb · Connections</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex" />
<meta name="google" content="notranslate" />
<meta http-equiv="Content-Language" content="en" />
<meta name="theme-color" content="#1c1c1e" />
<link rel="icon" type="image/png" href="/logo.png" />
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="/header.css">
<script src="/header.js" defer></script>
<script src="/i18n.js" defer></script>
<script src="/currency.js" defer></script>
</head>
<body class="notranslate">

<div id="aw-header"></div>


<main>

<section id="authState" class="hide">
  <h1 id="pageTitle">Connections</h1>
  <div class="tabs hide" id="tabBar"></div>
  <div id="tabMap">
    <section class="section">
      <div class="section-head">
        <h2 style="margin:0">Network Map</h2>
        <span class="reason" id="mapSummary" style="font-size:.78rem; margin-left:.6rem"></span>
        <span style="margin-left:auto; display:inline-flex; gap:.3rem; flex-wrap:wrap" id="mapFilter">
          <button class="ghost active" data-mf="all"      style="max-width:110px">All</button>
          <button class="ghost"        data-mf="listings" style="max-width:110px">Listings</button>
          <button class="ghost"        data-mf="mine"     style="max-width:110px">My tunnels</button>
        </span>
      </div>
      <div class="map-wrap" id="mapWrap">
        <svg id="worldMap" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet" role="img" aria-label="World map of AirWeb connections">
          <rect x="0" y="0" width="1000" height="500" fill="var(--map-bg)"/>
          <g id="worldLand" fill="var(--map-land)" stroke="var(--map-stroke)" stroke-width="0.4"></g>
          <g id="mapDots"></g>
        </svg>
        <div id="mapEmpty" class="empty hide" style="position:absolute; inset:auto 0 .8rem 0; text-align:center; pointer-events:none">No connections to display.</div>
        <div id="mapTip" class="map-tip hide" role="tooltip"></div>
      </div>
      <div class="map-legend">
        <span><span class="map-swatch listing"></span>Listing</span>
        <span><span class="map-swatch mine"></span>My tunnel</span>
        <span class="reason" style="margin-left:auto">Hover a dot for details</span>
      </div>
    </section>
  </div>
</section>

</main>

<script src="/app.js" defer></script>
</body></html>
