<!doctype html>
<html lang="en" translate="no">
<head>
<meta charset="utf-8" />
<title>AirWeb · Marketplace</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex" />
<meta name="google" content="notranslate" />
<meta http-equiv="Content-Language" content="en" />
<meta name="theme-color" content="#1c1c1e" />
<link rel="icon" type="image/png" href="/logo.png" />
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="/header.css">
<script src="/header.js" defer></script>
<script src="/i18n.js" defer></script>
<script src="/currency.js" defer></script>
</head>
<body class="notranslate">

<div id="aw-header"></div>


<main>

<section id="authState" class="hide">
  <h1 id="pageTitle">Marketplace</h1>
  <div class="tabs hide" id="tabBar"></div>
  <div id="tabMarketplace">
    <div class="card mf-card" style="margin-bottom:1rem">
      <div class="mf-row">
        <select id="mfProto" class="mf-proto">
          <option value="">Protocol</option>
          <option value="ssh">SSH</option>
          <option value="rdp">RDP</option>
          <option value="mysql">MySQL</option>
          <option value="postgres">PostgreSQL</option>
          <option value="mongodb">MongoDB</option>
          <option value="redis">Redis</option>
          <option value="vnc">VNC</option>
          <option value="http">HTTP</option>
          <option value="https">HTTPS</option>
        </select>
        <input id="mfQ" class="mf-search" type="text" placeholder="Search title or description…" />
        <label class="mf-price" title="Max price (credits / min)">
          <input id="mfMaxPrice" type="range" min="0" max="10" step="0.01" value="10" />
          <span class="mf-price-val" id="mfMaxPriceVal">All</span>
          <span>AWC/min</span>
        </label>
        <button id="mfApply">Apply</button>
        <button class="ghost" id="mfClear">Reset</button>
        <button type="button" class="mf-adv-toggle" id="mfAdvToggle" aria-expanded="false" aria-label="Toggle advanced filters" title="Advanced filters">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 5h18M6 12h12M10 19h4"/></svg>
        </button>
      </div>
      <div class="mf-adv" id="mfAdv" hidden>
        <div>
          <label>Country</label>
          <select id="mfCountry"><option value="">Any</option></select>
        </div>
        <div>
          <label>Min cores</label>
          <input id="mfMinCores" type="number" min="0" placeholder="0" />
        </div>
        <div>
          <label>Min RAM (GB)</label>
          <input id="mfMinRam" type="number" min="0" placeholder="0" />
        </div>
        <div>
          <label>OS contains</label>
          <input id="mfOs" placeholder="linux, debian…" />
        </div>
      </div>
    </div>

    <div class="card">
      <h2>All listings <span class="reason" id="marketCount" style="font-weight:400; text-transform:none; letter-spacing:0; font-size:.8rem"></span></h2>
      <div id="marketList"></div>
    </div>
  </div>
</section>

</main>

<script src="/app.js" defer></script>
</body></html>
